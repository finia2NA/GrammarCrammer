server {
    listen 80;
    server_name grammarcrammer.richardhanss.de;

    root /home/grammarcrammer/web;
    index index.html;

    # Compression (gzip handled globally in nginx.conf; brotli added here)
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Content-hashed static assets — safe to cache forever
    location /_expo/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static files (Expo web export)
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
